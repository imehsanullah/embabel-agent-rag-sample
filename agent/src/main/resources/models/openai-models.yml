# Requesty expects provider-qualified model ids such as "openai/gpt-5-mini".
# Override Embabel's default OpenAI catalog so the sample can use the


models:
  - name: "gpt5"
    model_id: "openai/gpt-5"
    display_name: "GPT-5"
    knowledge_cutoff_date: "2024-10-01"
    max_tokens: 16384
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 1.25
      usd_per1m_output_tokens: 10.0
    special_handling:
      supports_temperature: false

  - name: "gpt5mini"
    model_id: "openai/gpt-5-mini"
    display_name: "GPT-5 Mini"
    knowledge_cutoff_date: "2024-05-31"
    max_tokens: 16384
    temperature: 1.0
    pricing_model:
      usd_per1m_input_tokens: 0.25
      usd_per1m_output_tokens: 2.0
    special_handling:
      supports_temperature: false

  - name: "gpt5nano"
