spring:
  config:
    import: optional:file:../.env[.properties]

knowledge:
  data-directory: ../data

embabel:
  agent:
    platform:
      models:
        openai:
          api-key: ${OPENAI_API_KEY}
          base-url: ${OPENAI_API_URL}
  models:
    default-llm: openai/gpt-5-mini
    default-embedding-model: openai/text-embedding-3-small
    llms:
      CHEAPEST: openai/gpt-5-mini
      STANDARD: openai/gpt-5-mini
      BEST: openai/gpt-5
    embedding-services:
      FAST: openai/text-embedding-3-small
      ACCURATE: openai/text-embedding-3-large

dice:
  security:
    api-key:
      enabled: true
      keys:
        - impromptu-admin
